services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: mozjobs
      MYSQL_USER: mozjobs
      MYSQL_PASSWORD: mozjobs
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
  backend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.php
    volumes:
      - ../../backend:/var/www
    ports:
      - "8080:8080"
    depends_on:
      - mysql
  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
    volumes:
      - ../../web:/var/www
    ports:
      - "8081:8081"
    depends_on:
      - backend
